precision: bf16-mixed
data:
  _target_: ptp.data.PromptSchemeDataModule
  dataset_name: deepmind/code_contests
  prompt_scheme: "<|user|>\n{description}</s>\n<|assistant|>\nThe following python codes solves this problem:\n\n```python\n"
  # Prompts longer than this (in tokens) are truncated before generation.
  max_sequence_length: 2048
generate:
  num_completions: 32
  # Total context budget (tokens): prompt + generated completion must fit within this.
  max_total_length: 2048
  temperature: 0.7
  top_k: 50
  top_p: 0.95
teacher:
  model_id: TinyLlama/TinyLlama-1.1B-Chat-v1.0
  dtype: bfloat16
