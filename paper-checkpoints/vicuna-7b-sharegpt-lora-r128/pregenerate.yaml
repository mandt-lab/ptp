precision: bf16-mixed
data:
  _target_: ptp.data.ChatDataModule
  dataset_name: data_cache/ShareGPT_V3_unfiltered_cleaned_split_no_imsorry.json
  tokenizer: lmsys/vicuna-7b-v1.5
  # If the model's tokenizer has no built-in chat_template, provide one here.
  # See https://huggingface.co/docs/transformers/chat_templating
  # chat_template: |
  #   {% for message in messages %}{{ message['role'] }}: {{ message['content'] }}\n{% endfor %}
  mode: prompt
  conversation_keys: [messages, conversations, data]
  user_roles: [user, human]
  assistant_roles: [assistant, gpt, bing, chatgpt, bard, model]
  add_assistant_prompt: true
  # Prompts longer than this (in tokens) are truncated before generation.
  max_sequence_length: 2048
generate:
  num_completions: 32
  # Total context budget (tokens): prompt + generated completion must fit within this.
  max_total_length: 2048
  temperature: 0.7
  top_k: 50
  top_p: 0.95
teacher:
  model_id: lmsys/vicuna-7b-v1.5
  dtype: bfloat16
