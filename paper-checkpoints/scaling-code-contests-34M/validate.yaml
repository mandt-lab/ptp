validate:
  precision: bf16-mixed

data:
  _target_: ptp.data.load.PregeneratedDataModule
  root_dir: EXP_DIR/data
  train_completion_len: 16
  num_workers: 1
  batch_size: 1
  tokenizer_id: TinyLlama/TinyLlama-1.1B-Chat-v1.0

model:
  _target_: ptp.lit.ParallelSamplingLightningModule
  loss_type: bce
  error_correction: true
  tokens_to_fill: 64
  tokens_per_student_call: 16
  student_calls_per_step: 1
  student:
    _target_: ptp.transformer.MixedTransformerModel
    model_id:
      _target_: ptp.scaling.make_scaling_llama
      config_name: 34M
  teacher:
    _target_: ptp.transformer.TransformerModel
    model_id: TinyLlama/TinyLlama-1.1B-Chat-v1.0
  temperature: 0.7
  top_k: 50
  top_p: 0.95